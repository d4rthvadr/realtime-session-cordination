root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
delay = 200
entrypoint = "./tmp/api"
exclude_dir = ["bin", "tmp", "vendor"]
exclude_file = []
exclude_regex = ["_test\\.go$"]
follow_symlink = false
full_bin = "./tmp/api"
include_dir = ["cmd", "internal"]
include_ext = ["go", "tpl", "tmpl", "html", "env"]
kill_delay = "0s"
log = "build-errors.log"
poll = false
rerun = false
send_interrupt = true
stop_on_error = true

[color]
app = "cyan"
build = "yellow"
main = "magenta"
runner = "green"
watcher = "blue"

[log]
main_only = false
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true