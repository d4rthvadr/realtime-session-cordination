version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend/Dockerfile
    container_name: realtime-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GIN_MODE: debug
    restart: unless-stopped
    networks:
      - realtime-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  user-app:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend/Dockerfile.user
    container_name: realtime-user-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_BACKEND_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - realtime-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin-app:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend/Dockerfile.admin
    container_name: realtime-admin-app
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_BACKEND_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - realtime-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3002/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  realtime-network:
    driver: bridge
